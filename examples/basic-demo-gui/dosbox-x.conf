[sdl]
fullscreen        = false
fulldouble        = false
fullresolution    = original
windowresolution  = original
output            = openglpp
autolock          = true
autolock_feedback = beep
mouse_wheel_key   = -1
priority          = higher,normal

[dosbox]
# 386 with extended memory — matches DOS 6.x + DOS/4GW requirements
machine  = svga_s3
memsize  = 16
language =

[cpu]
core     = dynamic
cputype  = 386
cycles   = max

[dos]
# Enable XMS/EMS so DOS/4GW can access extended memory
xms = true
ems = true
umb = true
ver = 6.22

[mouse]
mouse = true

[autoexec]
@echo off
rem Unix-style aliases (from contento/dosbox-x-config)
alias cat   = type
alias clear = cls
alias rm    = del
alias cp    = copy
alias mv    = move
alias pwd   = cd
alias grep  = find
alias less  = more
alias man   = help
cls
rem Mount the project directory as C:
mount c .
c:
demo.exe
pause
pause
