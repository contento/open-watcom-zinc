[sdl]
fullscreen        = false
fullresolution    = original
windowresolution  = original
output            = openglpp
autolock          = true
autolock_feedback = beep
mouse_wheel_key   = -1
priority          = higher,normal

[dosbox]
machine  = svga_s3
memsize  = 16
language =

[cpu]
core    = dynamic
cputype = 386
cycles  = max

[dos]
xms = true
ems = true
umb = true
ver = 6.22

[autoexec]
@echo off
rem Unix-style aliases (from contento/dosbox-x-config)
alias cat   = type
alias clear = cls
alias rm    = del
alias cp    = copy
alias mv    = move
alias pwd   = cd
alias grep  = find
alias less  = more
alias man   = help
cls
rem Mount tutorials/hello as C:  (run dosbox-x from the project root)
mount c tutorials/hello
c:
rem Run one of: hello1.exe  hello2.exe  hello3.exe
hello1.exe
pause
