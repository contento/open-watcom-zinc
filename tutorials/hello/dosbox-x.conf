[sdl]
fullscreen        = false
fulldouble        = false
fullresolution    = original
windowresolution  = original
output            = openglpp
autolock          = true
autolock_feedback = beep
mouse_wheel_key   = -1
priority          = higher,normal

[dosbox]
# 386 with extended memory — matches DOS 6.x + DOS/4GW requirements
machine  = svga_s3
memsize  = 16
language =

[cpu]
core     = dynamic
cputype  = 386
cycles   = max

[dos]
# Enable XMS/EMS so DOS/4GW can access extended memory
xms = true
ems = true
umb = true
ver = 6.22

[mouse]
mouse = true

[autoexec]
@echo off
mount c .
c:
cls
echo Open Zinc Tutorials
echo.
echo hello1.exe - minimal window (no .dat required)
echo hello2.exe - help/error/exit systems (needs hello.dat)
echo hello3.exe - loads windows from hello.dat
echo.
