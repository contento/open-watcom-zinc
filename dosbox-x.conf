[sdl]
fullscreen=false
fulldouble=false
fullresolution=original
windowresolution=1024x768
output=surface

[dosbox]
# 386 with extended memory — matches DOS 6.x + DOS/4GW requirements
machine=svga_s3
memsize=16
language=

[cpu]
core=dynamic
cputype=386
cycles=max

[dos]
# Enable XMS/EMS so DOS/4GW can access extended memory
xms=true
ems=true
umb=true
# Emulate DOS version 6.22
ver=6.22

[autoexec]
# Mount the project directory as C:
# Adjust the host path below to match your local checkout
mount c .
c:
demo.exe
